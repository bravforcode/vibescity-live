name: AI PR Reviewer

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  pull_request_review_comment:
    types:
      - created
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || contains(github.event.comment.body, '@coderabbitai review') }}
    steps:
      - name: CodeRabbit AI PR Reviewer
        uses: coderabbitai/openai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          debug: false
          review_simple_changes: false
          review_comment_lgtm: false
          openai_light_model: gpt-4o-mini
          openai_heavy_model: gpt-4o
          openai_timeout_ms: 900000 # 15 mins.
          system_message: |
            You are \`CodeRabbit\`, an expert software engineer and code reviewer.
            Provide a thorough, comprehensive review of the code changes.
            Focus on:
            - Code bugs and edge cases
            - Security vulnerabilities
            - Performance issues
            - Adherence to clean code principles (SRP, DRY, KISS)
            - Typescript/Vue 3/FastAPI best practices
            Do not nitpick minor formatting issues that BiomeJS would handle.
