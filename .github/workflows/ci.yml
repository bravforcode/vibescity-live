name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Repo hygiene gate
        run: npm run ci:repo-hygiene

  enterprise-security-scan:
    needs: [repo-hygiene]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install security tools
        run: |
          pip install bandit semgrep
          npm install -g snyk

      - name: Run Enterprise Security Validator
        run: python .agent/scripts/security_validator.py .

  frontend:
    needs: [repo-hygiene]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build (prerender)
        run: npm run build

      - name: SEO lint gate
        run: node scripts/ci/seo-lint.mjs

      - name: Check for env placeholders
        run: node scripts/ci/check-env-placeholders.mjs

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin v8.24.2

      - name: Secret scan (gitleaks)
        run: npm run ci:secret-scan:gitleaks

      - name: Secret scan (Stripe patterns)
        run: npm run ci:secret-scan

      - name: Guard SQL runlist safety rules
        run: node scripts/ci/check-runlist-guards.mjs

  data-quality:
    needs: [repo-hygiene]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Feature flag audit
        run: npm run flags:audit

      - name: Thai locale validator
        run: npm run i18n:validate-thai

      - name: Venue data validator
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        shell: bash
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Skipping venue:validate (SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY not configured)."
            exit 0
          fi
          npm run venue:validate

  backend-tests:
    needs: [repo-hygiene]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run backend pytest
        env:
          PYTHONPATH: backend
          ENV: testing
          METRICS_ENABLED: "true"
          OTEL_ENABLED: "false"
        run: python -m pytest backend/tests

  enterprise-updates:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [frontend, backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt python-dotenv asyncpg httpx

      - name: Execute Enterprise Updates (Migrations, Cron, Backfill)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          cd backend
          python scripts/execute_enterprise_updates.py

  map-quarantine-sla:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: [frontend, backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate map quarantine SLA metadata
        env:
          PW_NO_WEBSERVER: "1"
        run: node scripts/ci/validate-map-quarantine-sla.mjs

  e2e-smoke:
    if: ${{ github.event_name == 'pull_request' }}
    needs: [frontend, backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: node scripts/run-playwright-cli.mjs install --with-deps

      - name: Run E2E smoke (low-mem)
        run: PW_LOW_MEM=1 PW_GREP=@smoke node scripts/run-playwright-cli.mjs test

      - name: Console Budget (smoke)
        if: ${{ always() }}
        run: node scripts/ci/ui-console-budget.mjs

      - name: Step Summary (smoke)
        if: ${{ always() }}
        run: node scripts/ci/e2e-summary.mjs --lane smoke --junit reports/e2e/junit.xml --console test-results/ui-console-events.ndjson

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 14

  e2e-mobile-contracts:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: [frontend, backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: node scripts/run-playwright-cli.mjs install --with-deps chromium webkit

      - name: Run E2E mobile contracts
        run: npm run test:e2e:mobile-contracts

      - name: Console Budget (mobile-contracts)
        if: ${{ always() }}
        run: node scripts/ci/ui-console-budget.mjs

      - name: Step Summary (mobile-contracts)
        if: ${{ always() }}
        run: node scripts/ci/e2e-summary.mjs --lane mobile-contracts --junit reports/e2e/junit.xml --console test-results/ui-console-events.ndjson

      - name: Upload Playwright report (mobile-contracts)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile-contracts
          path: playwright-report/
          retention-days: 14

  e2e-full:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [frontend, backend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: node scripts/run-playwright-cli.mjs install --with-deps

      - name: Run E2E full matrix (exclude quarantine lane)
        run: PW_GREP_INVERT=@map-quarantine node scripts/run-playwright-cli.mjs test

      - name: Console Budget (full)
        if: ${{ always() }}
        run: node scripts/ci/ui-console-budget.mjs

      - name: Step Summary (full)
        if: ${{ always() }}
        run: node scripts/ci/e2e-summary.mjs --lane full --junit reports/e2e/junit.xml --console test-results/ui-console-events.ndjson

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 30

  e2e-map-required:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: [frontend, backend-tests, map-quarantine-sla, e2e-map-preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: node scripts/run-playwright-cli.mjs install --with-deps chromium

      - name: Validate MAPBOX_PUBLIC_TOKEN (strict lane)
        run: |
          if [ -z "${{ secrets.MAPBOX_PUBLIC_TOKEN }}" ]; then
            echo "MAPBOX_PUBLIC_TOKEN is required for e2e-map-required."
            exit 1
          fi

      - name: Run E2E @map-required (Desktop Chromium)
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
        run: npm run test:e2e:map-required

      - name: Console Budget (map-required)
        if: ${{ always() }}
        run: node scripts/ci/ui-console-budget.mjs

      - name: Step Summary (map-required)
        if: ${{ always() }}
        run: node scripts/ci/e2e-summary.mjs --lane map-required --junit reports/e2e/junit.xml --console test-results/ui-console-events.ndjson

      - name: Upload Playwright report (map-required)
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-map-required
          path: playwright-report/
          retention-days: 30

  e2e-map-preflight:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: [frontend, backend-tests, map-quarantine-sla]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: node scripts/run-playwright-cli.mjs install --with-deps chromium

      - name: Validate MAPBOX_PUBLIC_TOKEN (preflight lane)
        run: |
          if [ -z "${{ secrets.MAPBOX_PUBLIC_TOKEN }}" ]; then
            echo "MAPBOX_PUBLIC_TOKEN is required for e2e-map-preflight."
            exit 1
          fi

      - name: Run E2E @map-preflight (Desktop Chromium)
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
        run: npm run test:e2e:map-preflight

      - name: Console Budget (map-preflight)
        if: ${{ always() }}
        run: node scripts/ci/ui-console-budget.mjs

      - name: Step Summary (map-preflight)
        if: ${{ always() }}
        run: node scripts/ci/e2e-summary.mjs --lane map-preflight --junit reports/e2e/junit.xml --console test-results/ui-console-events.ndjson

      - name: Upload Playwright report (map-preflight)
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-map-preflight
          path: playwright-report/
          retention-days: 30

  e2e-map-quarantine:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [frontend, backend-tests, map-quarantine-sla]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: node scripts/run-playwright-cli.mjs install --with-deps chromium

      - name: Validate MAPBOX_PUBLIC_TOKEN (quarantine lane)
        run: |
          if [ -z "${{ secrets.MAPBOX_PUBLIC_TOKEN }}" ]; then
            echo "MAPBOX_PUBLIC_TOKEN is required for e2e-map-quarantine."
            exit 1
          fi

      - name: Run E2E @map-quarantine (non-blocking)
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
        run: npm run test:e2e:map-quarantine

      - name: Console Budget (map-quarantine)
        if: ${{ always() }}
        run: node scripts/ci/ui-console-budget.mjs

      - name: Step Summary (map-quarantine)
        if: ${{ always() }}
        run: node scripts/ci/e2e-summary.mjs --lane map-quarantine --junit reports/e2e/junit.xml --console test-results/ui-console-events.ndjson

      - name: Upload Playwright report (map-quarantine)
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-map-quarantine
          path: playwright-report/
          retention-days: 14

  e2e-fallback:
    if: ${{ needs.e2e-full.result == 'failure' }}
    needs: [e2e-full]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: node scripts/run-playwright-cli.mjs install --with-deps

      - name: Run E2E fallback (low-mem)
        run: PW_LOW_MEM=1 node scripts/run-playwright-cli.mjs test

      - name: Console Budget (fallback)
        if: ${{ always() }}
        run: node scripts/ci/ui-console-budget.mjs

      - name: Step Summary (fallback)
        if: ${{ always() }}
        run: node scripts/ci/e2e-summary.mjs --lane fallback --junit reports/e2e/junit.xml --console test-results/ui-console-events.ndjson

      - name: Upload Playwright report (fallback)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-fallback
          path: playwright-report/
          retention-days: 14
