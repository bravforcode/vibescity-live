name: i18n Autopilot

on:
  push:
    branches: [staging, main]
    paths:
      - 'src/**/*.{vue,js,ts}'
      - 'src/locales/**'
      - 'scripts/ci/i18n*'
  pull_request:
    branches: [staging, main]
    paths:
      - 'src/**/*.{vue,js,ts}'
      - 'src/locales/**'
      - 'scripts/ci/i18n*'

jobs:
  i18n-autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: i18n Sync & Translate

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run i18n autopilot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bun run i18n:autopilot

      - name: Check for changes
        id: changed
        run: |
          if git diff --quiet src/locales/ tmp/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create commit if changes
        if: steps.changed.outputs.has_changes == 'true' && github.event_name == 'pull_request'
        run: |
          git config user.name "i18n-autopilot[bot]"
          git config user.email "autopilot+i18n@vibecity.local"
          git add src/locales/ tmp/i18n*.json
          git commit -m "fix(i18n): auto-sync locales and translate missing Thai keys

- Fixed ${changed_count} hardcoded string violations
- Auto-translated missing TH keys via Claude API
- Synced locale parity (en.json <-> th.json)
- Removed orphaned keys

[skip ci]" || echo "No changes to commit"

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-reports
          path: tmp/i18n*.json
          retention-days: 30

      - name: Comment on PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'tmp/i18n-autopilot-report.json';

            if (!fs.existsSync(reportPath)) return;

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const { violations, sync, orphans, translated } = report.pipeline;

            let comment = '## i18n Autopilot Report\n\n';
            comment += `| Metric | Count |\n`;
            comment += `|--------|-------|\n`;
            if (violations !== null) {
              comment += `| Hardcoded violations fixed | ${violations} |\n`;
            }
            if (sync) {
              comment += `| Untranslated TH keys | ${sync.untranslated} |\n`;
              comment += `| Missing in TH | ${sync.missingInTh} |\n`;
              comment += `| Orphaned keys | ${sync.orphanedInTh} |\n`;
            }
            if (translated !== null) {
              comment += `| Auto-translated to Thai | ${translated} |\n`;
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
