name: Ops Agent Advisor

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

concurrency:
  group: ops-agent-advisor
  cancel-in-progress: true

jobs:
  advisor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build advisory trend input
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TREND_DAYS: "7"
          TREND_STRICT_MIN_PASS_RATE: "95"
          TREND_SYNTHETIC_OVERALL_MIN_PASS_RATE: "95"
          TREND_OUTPUT_PATH: "reports/ci/weekly-quality-trend.json"
        run: node scripts/ci/weekly-quality-trend.mjs

      - name: Triage advisory inputs
        id: triage
        run: |
          node scripts/agents/triage-cycle.mjs \
            --trigger scheduled_advisor \
            --source scheduled_advisor \
            --input reports/ci/weekly-quality-trend.json

      - name: Auto safe remediation
        id: remediate
        if: ${{ steps.triage.outputs.auto_remediation_eligible == 'true' }}
        run: node scripts/agents/safe-remediate.mjs --report "${{ steps.triage.outputs.report_path }}" --execute

      - name: Publish advisory report
        if: ${{ steps.triage.outputs.report_path != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/agents/publish-agent-report.mjs --report "${{ steps.triage.outputs.report_path }}"

      - name: Publish remediation report
        if: ${{ steps.remediate.outputs.remediation_report_path != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/agents/publish-agent-report.mjs --report "${{ steps.remediate.outputs.remediation_report_path }}"

      - name: Upload agent reports
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ops-agent-advisor-reports
          path: reports/agents
          retention-days: 14
          if-no-files-found: ignore
