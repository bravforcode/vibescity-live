name: Security Gates

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dependency-and-license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Dependency vulnerability gate
        run: bun audit --audit-level=high

      - name: License policy gate
        run: npx --yes license-checker --production --failOn "GPL;AGPL;LGPL;GPL-2.0;GPL-3.0;AGPL-3.0"

  vite-public-secret-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate VITE public env safety
        run: npm run ci:vite-public-secrets

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom-spdx
