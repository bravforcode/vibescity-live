app = "vibecity-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["api"]

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["api"]

  [[services.concurrency]]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    method = "get"
    path = "/api/v1/health"

# Horizontal Scaling Policy:
# - Min 1 machine (Cold start prevention)
# - Max 5 machines (Budget guardrail)
# - Scale out when soft_limit (200 requests/s) is reached.

[processes]
  api = "uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port 8000"
  clock = "python backend/scripts/osm_sync_ultimate.py --loop=999999"
  ocr = "python backend/scripts/ocr_worker.py"

# api VM: auto-suspend when idle (cold start ~500ms-2s) — saves ~$5-10/month
[[vm]]
  size = "shared-cpu-1x"
  memory = "256"
  processes = ["api"]

# clock VM: must run continuously for OSM sync — downsized from 512MB → 256MB, saves ~$3-5/month
[[vm]]
  size = "shared-cpu-1x"
  memory = "256"
  processes = ["clock"]

# ocr VM: on-demand processing — auto-suspend when not in use, saves ~$5-10/month
[[vm]]
  size = "shared-cpu-1x"
  memory = "256"
  processes = ["ocr"]

[metrics]
  port = 9091
  path = "/metrics"
