# GitHub Actions Workflow for CDN Deployment
# Place this in .github/workflows/cdn-deploy.yml

name: Deploy CDN Worker

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/cdn/**'
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Wrangler
        run: npm install -g wrangler
      
      - name: Deploy to Staging
        working-directory: infrastructure/cdn
        run: wrangler deploy --env staging
      
      - name: Test Staging Deployment
        run: |
          sleep 10
          curl -I https://staging-worker.workers.dev

  
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://vibecity.live
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Wrangler
        run: npm install -g wrangler
      
      - name: Deploy to Production
        working-directory: infrastructure/cdn
        run: wrangler deploy --env production
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        run: pip install requests
      
      - name: Purge CDN Cache
        working-directory: infrastructure/cdn
        env:
          CACHE_SECRET: ${{ secrets.CACHE_PURGE_SECRET }}
        run: |
          python cache-purge-webhook.py purge \
            --worker-url https://vibecity.live \
            --secret $CACHE_SECRET \
            --type static
      
      - name: Warm Critical Pages
        working-directory: infrastructure/cdn
        env:
          CACHE_SECRET: ${{ secrets.CACHE_WARM_SECRET }}
        run: |
          python cache-purge-webhook.py warm \
            --worker-url https://vibecity.live \
            --secret $CACHE_SECRET \
            --type critical
      
      - name: Test Production Deployment
        working-directory: infrastructure/cdn
        run: |
          python test-cdn-performance.py \
            --url https://vibecity.live \
            --iterations 5
