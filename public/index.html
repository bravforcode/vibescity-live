    <!-- Warm connection for Supabase API -->

    <style>
      /* === CRITICAL CSS === Inline to unblock first paint. Keep < 14KB. */
      :root {
        --vc-color-bg-canvas: #030305;
        --vc-color-bg-base: #050508;
        --vc-font-body: "Inter", "Sarabun", system-ui, sans-serif;
        --vc-font-display: "Inter", "Sarabun", system-ui, sans-serif;
        --font-display: var(--vc-font-display);
        --font-body: var(--vc-font-body);
        --font-mono: "JetBrains Mono", "Fira Code", "IBM Plex Mono", monospace;
      }

      /* App shell — paint immediately, Vue mounts into this */
      html, body {
        margin: 0;
        padding: 0;
        background-color: var(--vc-color-bg-canvas);
        font-family: var(--vc-font-body);
        height: 100%;
        overflow: hidden;
        overflow-x: hidden;
        max-width: 100vw;
        -webkit-tap-highlight-color: transparent;
        color: #ffffff;
      }

      #app {
        height: 100%;
        width: 100%;
      }

      main {
        height: 100%;
      }

      /* Critical app-shell skeleton shown before JS hydrates */
      #app:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: var(--vc-color-bg-canvas);
        z-index: 9999;
      }

      /* Skip link */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #8b5cf6;
        color: white;
        padding: 8px;
        z-index: 10000;
        transition: top 0.3s;
        text-decoration: none;
      }
      .skip-link:focus {
        top: 0;
      }

      /* Scrollbar aesthetics (matches App.vue) */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to Map Content</a>
    <main id="main-content" tabindex="-1">
      <div id="app"></div>
      <noscript>
        <section aria-labelledby="vibecity-noscript-title">
          <h1 id="vibecity-noscript-title">VibeCity Thailand Entertainment Map</h1>
          <p>
            Simply put, VibeCity helps people find nightlife, cafes, events, and
            local experiences across Thailand with live venue context.
          </p>
          <h2>How VibeCity works</h2>
          <ul>
            <li>Discover nearby venues and categories across Thailand.</li>
            <li>Review practical details before deciding where to go.</li>
            <li>Use live venue context to plan nightlife and local exploration.</li>
          </ul>
          <h2>Frequently asked questions</h2>
          <details>
            <summary>What can I discover with VibeCity?</summary>
            <p>
              According to live venue data, VibeCity covers cafes, nightlife,
              wellness, shopping, and other local categories in one map-first experience.
            </p>
          </details>
          <details>
            <summary>Who publishes this content?</summary>
            <p>Written by the VibeCity Team and updated for the 2026 public launch.</p>
          </details>
        </section>
      </noscript>
    </main>
  </body>
