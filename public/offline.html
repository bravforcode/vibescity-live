<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeCity — Offline</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #7c3aed;
        color: white;
        padding: 8px 12px;
        z-index: 1000;
        transition: top 0.2s ease;
      }
      .skip-link:focus { top: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f0f1a;
        color: #e4e4f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
        text-align: center;
        gap: 16px;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(139,92,246,0.15);
        border: 1px solid rgba(139,92,246,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin-bottom: 8px;
      }
      h1 { font-size: 1.4rem; font-weight: 800; color: #fff; }
      p  { font-size: 0.95rem; color: rgba(255,255,255,0.5); max-width: 280px; line-height: 1.5; }
      button {
        margin-top: 8px;
        padding: 12px 28px;
        border-radius: 14px;
        background: linear-gradient(135deg, #7c3aed, #db2777);
        color: #fff;
        font-size: 0.95rem;
        font-weight: 700;
        border: none;
        cursor: pointer;
        min-height: 44px;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#offline-main">Skip to offline message</a>
    <main id="offline-main">
      <div class="icon">📡</div>
      <h1>You're offline</h1>
      <p>Check your connection and try again. VibeCity needs the internet to show venues near you.</p>
      <button id="retry-button" type="button">Try again</button>
    </main>
    <script>
      document.getElementById("retry-button")?.addEventListener("click", () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
